<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body>
    <nav class="navbar navbar-expand bg-black">
        <div class="container-fluid">
            <a href="#" class="navbar-brand text-light text-decoration-none"> CRUD Operations</a>
        </div>
    </nav>
    <div class="container mt-5" >
        <div class="row">
            <h5><i class="bi bi-plus-square-fill"></i>Add New Product</h5>
        <hr />
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Home </a></li>
                <li class="breadcrumb-item-active"> / Add New Product</li>
            </ol>
        </nav>
        <div class="col-md-8">
            <form action="#" method="post">
                <div class="row mb-3">
                    <div class="col-md-12">
                      <label for="name" class="form-label">Name</label>
                      <input type="text" name="name" id="name" class="form-control" placeholder="Enter Product Name">
                    </div>
                </div>
    <div class="row mb-3">
    <div class="col-md-6">
        <label for="mrp" class="form-label">M R P</label>
        <input type="text" name="mrp" id="mrp" class="form-control" placeholder="Enter M R P ">
    </div>

    <div class="col-md-6">
        <label for="price" class="form-label">Selling Price</label>
        <input type="text" name="price" id="price" class="form-control" placeholder="Enter Selling Price ">
    </div>
</div>
<div class="row mb-3">
    <div class="col-md-12">
        <label for="description"></label>
        <textarea name="" id="description" cols="30" rows="10" class="form-control" style="resize: none; height: 150px"; placeholder="Enterr Description"></textarea>
    </div>
</div>
<div class="row mb-3">
                    <div class="col-md-12">
                      <label for="image" class="form-label">Product Image</label>
                      <input type="file" name="image" id="image" class="form-control" >
                    </div>
                </div>
            <div class="mb-3">
                <button type="submit" class="btn btn-success">Save </button>
                                <button type="reset" class="btn btn-danger">Reset </button>

            </div>
            </form>
        </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
